name: Build and publish bifrost image

on:
  schedule:
    - cron: "13 * * * *"
  workflow_dispatch:
    inputs:
      backfill_all:
        description: "Build all missing upstream tags instead of default latest/stable/prerelease set"
        required: false
        type: boolean
        default: false
      explicit_tags:
        description: "Optional comma-separated upstream tags to build (e.g. latest,v2.0.0-prerelease2)"
        required: false
        type: string
        default: ""
      max_tags:
        description: "Backfill cap per run (1-256, default 200)"
        required: false
        type: string
        default: "200"

permissions:
  contents: write
  packages: write

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      new_tags_json: ${{ steps.detect.outputs.new_tags_json }}
      new_tags_count: ${{ steps.detect.outputs.new_tags_count }}
      latest_upstream: ${{ steps.detect.outputs.latest_upstream }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Detect unprocessed upstream tags
        id: detect
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.backfill_all }}" = "true" ]; then
            LATEST_ONLY=false
          else
            LATEST_ONLY=true
          fi

          EXPLICIT_TAGS="${{ github.event_name == 'workflow_dispatch' && inputs.explicit_tags || '' }}"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.backfill_all }}" = "true" ]; then
            MAX_TAGS="${{ inputs.max_tags }}"
          else
            MAX_TAGS="200"
          fi

          python scripts/detect_new_tags.py \
            --repository maximhq/bifrost \
            --latest-only "$LATEST_ONLY" \
            --explicit-tags "$EXPLICIT_TAGS" \
            --max-tags "$MAX_TAGS" \
            --github-output "$GITHUB_OUTPUT"

  build-and-push:
    runs-on: ubuntu-latest
    needs: detect
    if: ${{ needs.detect.outputs.new_tags_count != '' && needs.detect.outputs.new_tags_count != '0' }}
    env:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
    strategy:
      fail-fast: false
      matrix:
        tag: ${{ fromJson(needs.detect.outputs.new_tags_json || '[]') }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate Docker Hub credentials
        run: |
          if [ -z "${DOCKERHUB_USERNAME}" ]; then
            echo "::error::Missing DOCKERHUB_USERNAME secret"
            exit 1
          fi
          if [ -z "${DOCKERHUB_TOKEN}" ]; then
            echo "::error::Missing DOCKERHUB_TOKEN secret"
            exit 1
          fi
          echo "Docker Hub user: ${DOCKERHUB_USERNAME}"

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_TOKEN }}

      - name: Resolve upstream platforms for this tag
        id: platforms
        run: |
          python3 scripts/get_tag_platforms.py \
            --repository maximhq/bifrost \
            --tag "${{ matrix.tag }}" \
            --github-output "$GITHUB_OUTPUT"

      - name: Build and push tag image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          push: true
          platforms: ${{ steps.platforms.outputs.platforms }}
          build-args: |
            UPSTREAM_TAG=${{ matrix.tag }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/bifrost:${{ matrix.tag }}
            docker.io/${{ env.DOCKERHUB_USERNAME }}/bifrost:${{ matrix.tag }}

      - name: Build and push latest alias
        if: ${{ matrix.tag == needs.detect.outputs.latest_upstream }}
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          push: true
          platforms: ${{ steps.platforms.outputs.platforms }}
          build-args: |
            UPSTREAM_TAG=${{ matrix.tag }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/bifrost:latest
            docker.io/${{ env.DOCKERHUB_USERNAME }}/bifrost:latest

      - name: Mark upstream tag as processed
        continue-on-error: true
        run: |
          set +e
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          marker="upstream/${{ matrix.tag }}"
          if git rev-parse "$marker" >/dev/null 2>&1; then
            echo "Marker tag $marker already exists"
            exit 0
          fi

          git tag "$marker"
          if ! git push origin "$marker"; then
            echo "::warning::Marker push failed (likely token permission policy). Image publish already completed."
          fi
          exit 0
