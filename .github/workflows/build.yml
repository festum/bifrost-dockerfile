name: Build and publish bifrost image

on:
  schedule:
    - cron: "13 * * * *"
  workflow_dispatch:
    inputs:
      backfill_all:
        description: "Build all missing upstream tags instead of only latest"
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  packages: write

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      new_tags_json: ${{ steps.detect.outputs.new_tags_json }}
      new_tags_count: ${{ steps.detect.outputs.new_tags_count }}
      latest_upstream: ${{ steps.detect.outputs.latest_upstream }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Detect unprocessed upstream tags
        id: detect
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.backfill_all }}" = "true" ]; then
            LATEST_ONLY=false
          else
            LATEST_ONLY=true
          fi

          python scripts/detect_new_tags.py \
            --repository maximhq/bifrost \
            --latest-only "$LATEST_ONLY" \
            --github-output "$GITHUB_OUTPUT"

  build-and-push:
    runs-on: ubuntu-latest
    needs: detect
    if: ${{ needs.detect.outputs.new_tags_count != '0' }}
    strategy:
      fail-fast: false
      matrix:
        tag: ${{ fromJson(needs.detect.outputs.new_tags_json) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub (optional)
        if: ${{ secrets.DOCKERHUB_USERNAME != '' && secrets.DOCKERHUB_TOKEN != '' }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push tag image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          build-args: |
            UPSTREAM_TAG=${{ matrix.tag }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/bifrost-dockerfile:${{ matrix.tag }}

      - name: Build and push latest alias
        if: ${{ matrix.tag == needs.detect.outputs.latest_upstream }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          build-args: |
            UPSTREAM_TAG=${{ matrix.tag }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/bifrost-dockerfile:latest

      - name: Mark upstream tag as processed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          marker="upstream/${{ matrix.tag }}"
          if git rev-parse "$marker" >/dev/null 2>&1; then
            echo "Marker tag $marker already exists"
            exit 0
          fi

          git tag "$marker"
          git push origin "$marker"
