name: Build and publish bifrost image

on:
  schedule:
    - cron: "13 * * * *"
  workflow_dispatch:
    inputs:
      backfill_all:
        description: "Build all missing upstream tags instead of only latest"
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  packages: write

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      new_tags_json: ${{ steps.detect.outputs.new_tags_json }}
      new_tags_count: ${{ steps.detect.outputs.new_tags_count }}
      latest_upstream: ${{ steps.detect.outputs.latest_upstream }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Detect unprocessed upstream tags
        id: detect
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.backfill_all }}" = "true" ]; then
            LATEST_ONLY=false
          else
            LATEST_ONLY=true
          fi

          python scripts/detect_new_tags.py \
            --repository maximhq/bifrost \
            --latest-only "$LATEST_ONLY" \
            --github-output "$GITHUB_OUTPUT"

  build-and-push:
    runs-on: ubuntu-latest
    needs: detect
    if: ${{ needs.detect.outputs.new_tags_count != '' && needs.detect.outputs.new_tags_count != '0' }}
    env:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
    strategy:
      fail-fast: false
      matrix:
        tag: ${{ fromJson(needs.detect.outputs.new_tags_json || '[]') }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate Docker Hub credentials
        run: |
          if [ -z "${DOCKERHUB_USERNAME}" ]; then
            echo "::error::Missing DOCKERHUB_USERNAME secret"
            exit 1
          fi
          if [ -z "${DOCKERHUB_TOKEN}" ]; then
            echo "::error::Missing DOCKERHUB_TOKEN secret"
            exit 1
          fi
          echo "Docker Hub user: ${DOCKERHUB_USERNAME}"

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_TOKEN }}

      - name: Build and push tag image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          build-args: |
            UPSTREAM_TAG=${{ matrix.tag }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/bifrost-dockerfile:${{ matrix.tag }}
            docker.io/${{ env.DOCKERHUB_USERNAME }}/bifrost-dockerfile:${{ matrix.tag }}

      - name: Build and push latest alias
        if: ${{ matrix.tag == needs.detect.outputs.latest_upstream }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          build-args: |
            UPSTREAM_TAG=${{ matrix.tag }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/bifrost-dockerfile:latest
            docker.io/${{ env.DOCKERHUB_USERNAME }}/bifrost-dockerfile:latest

      - name: Mark upstream tag as processed
        continue-on-error: true
        env:
          MARKER_PUSH_TOKEN: ${{ secrets.MARKER_PUSH_TOKEN }}
        run: |
          set +e
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          marker="upstream/${{ matrix.tag }}"
          if git rev-parse "$marker" >/dev/null 2>&1; then
            echo "Marker tag $marker already exists"
            exit 0
          fi

          git tag "$marker"

          pushed=false
          # First try default token from actions/checkout.
          if git push origin "$marker"; then
            pushed=true
          # If blocked by missing workflows permission, optionally retry with PAT/fine-grained token.
          elif [ -n "$MARKER_PUSH_TOKEN" ]; then
            echo "Retry marker push with MARKER_PUSH_TOKEN"
            git remote set-url origin "https://x-access-token:${MARKER_PUSH_TOKEN}@github.com/${{ github.repository }}.git"
            if git push origin "$marker"; then
              pushed=true
            fi
          fi

          # Best-effort marker push: do not fail image publish if marker push is blocked by repo token policy.
          if [ "$pushed" != "true" ]; then
            echo "::warning::Marker push failed (likely token permission policy). Image publish already completed."
          fi
          exit 0
